<p class="mt-[0.6rem] mb-0 text-[0.98rem] leading-[1.78] mb-[0.85rem] print:[orphans:3] print:[widows:3]">Endometrioza i PCOS to główne przyczyny niepłodności na świecie. Bolesne miesiączki zakłócające codzienne życie nie są normalne. Średni czas do postawienia prawidłowej diagnozy endometriozy wynosi 7–10 lat<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-03">[3]</a></sup>, a pacjentki odwiedzają średnio 5–10 lekarzy zanim ktoś postawi właściwą diagnozę. „Jeśli masz bolesne miesiączki, traktuj to jako endometriozę, dopóki nie zostanie wykluczona." — Dr Aliabadi</p></div>

<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s3-diary"><b>Prowadź dziennik objawów</b> — ból, cykl, wzdęcia, ból przy stosunku. Wzorce stają się widoczne po kilku miesiącach.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s3-rec-amh"><b>Poproś o badanie AMH</b> (hormon antymüllerowski) — prosty test z krwi pozwalający ocenić rezerwę jajnikową.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s3-rec-usg"><b>Poproś o USG miednicy</b> — powinno być częścią corocznego badania ginekologicznego.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s3-rec-mri"><b>Jeśli objawy są ciężkie, proś o MRI miednicy</b> — lepsze niż USG przy podejrzeniu głębszych zmian.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s3-rec-spec"><b>Szukaj specjalisty od endometriozy</b> — nie każdy ginekolog ma doświadczenie w diagnostyce i leczeniu endo.</li>
</ol>
<h2 class="text-[1.18rem] font-bold text-accent [margin:3rem_0_0.9rem] pb-[0.35rem] border-b-[2px] border-b-accent-light [&_.n]:text-muted [&_.n]:font-medium [&_.n]:mr-[0.3rem] print:!text-[#000] print:border-b-[1px] print:border-b-[#999] print:[page-break-after:avoid] print:[break-after:avoid]" id="leczenie"><span class="n">4.</span> Leczenie endometriozy <a class="ts text-[0.72em] text-accent no-underline [padding:0.1em_0.45em_0.1em_0.3em] rounded-[3px] bg-accent-light whitespace-nowrap cursor-pointer ml-[0.3em] [font-variant-numeric:tabular-nums] align-middle inline-flex items-center gap-[0.25em] [transition:background_0.15s_ease,_transform_0.15s_ease] before:content-[ print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0 decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:underline"▸"] before:text-[0.95em] before:opacity-[0.65] before:leading-[1] before:[transition:transform_0.2s_cubic-bezier(.34,1.3,.64,1)),_opacity_0.15s_ease] hover:bg-[rgba(27,_58,_92,_0.2)] hover:outline-[2px] hover:outline-accent hover:outline-offset-[1px] focus-visible:bg-[rgba(27,_58,_92,_0.2)] focus-visible:outline-[2px] focus-visible:outline-accent focus-visible:outline-offset-[1px] hover:before:opacity-[1] hover:before:[transform:translateX(1px)_scale(1.15)] focus-visible:before:opacity-[1] focus-visible:before:[transform:translateX(1px)_scale(1.15)] print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0" href="#" data-t="7292">2:01:32</a></h2>
<h3 class="text-[1.02rem] font-semibold [margin:1.7rem_0_0.45rem] text-[rgb(36,_52,_70)] print:!text-[#000] print:[page-break-after:avoid] print:[break-after:avoid]">Podejście krok po kroku</h3>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s4-step1"><b>Krok 1 — Supresja hormonalna (pierwsza linia)</b>
Ciągłe tabletki antykoncepcyjne (estrogen + progesteron) lub wkładka progestagenowa (Mirena, Kyleena). Cel: obniżenie poziomu estrogenu, który karmi ogniska endometriozy.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-02">[2]</a></sup></div>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s4-step2"><b>Krok 2 — Chirurgia (gdy supresja nie wystarcza)</b>
Laparoskopowe <strong>wycięcie</strong> (excision) ognisk, nie przypalanie (ablacja).<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-02">[2]</a></sup> Niewielu ginekologów ma zaawansowane przeszkolenie w laparoskopowej chirurgii endometriozy. Szukaj chirurga, który robi to regularnie.</div>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s4-step3"><b>Krok 3 — Po operacji: zawsze supresja hormonalna</b>
Bez supresji choroba wraca.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-02">[2]</a></sup> Często wkładka progestagenowa zakładana tuż po operacji. W ciężkich przypadkach (stadium 3–4): antagoniści GnRH (Orilissa, Myfembree) na 6 miesięcy do 2 lat.</div>
<div class="px-4 py-[0.8rem] my-[0.95rem] text-[0.88rem] rounded-r-[10px] shadow-sm bg-warn-bg border-l-4 border-warn [&>em]:not-italic [&>em]:font-semibold [&>em]:text-warn" data-cell-id="s4-preg"><strong>Ciąża nie jest leczeniem endometriozy.</strong><sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-02">[2]</a></sup> Może tymczasowo złagodzić objawy (supresja owulacji, wysoki progesteron), ale ogniska przetrwają i objawy wracają po porodzie.</div>
<h2 class="text-[1.18rem] font-bold text-accent [margin:3rem_0_0.9rem] pb-[0.35rem] border-b-[2px] border-b-accent-light [&_.n]:text-muted [&_.n]:font-medium [&_.n]:mr-[0.3rem] print:!text-[#000] print:border-b-[1px] print:border-b-[#999] print:[page-break-after:avoid] print:[break-after:avoid]" id="plodnosc"><span class="n">5.</span> Endometrioza a płodność <a class="ts text-[0.72em] text-accent no-underline [padding:0.1em_0.45em_0.1em_0.3em] rounded-[3px] bg-accent-light whitespace-nowrap cursor-pointer ml-[0.3em] [font-variant-numeric:tabular-nums] align-middle inline-flex items-center gap-[0.25em] [transition:background_0.15s_ease,_transform_0.15s_ease] before:content-[ print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0 decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:underline"▸"] before:text-[0.95em] before:opacity-[0.65] before:leading-[1] before:[transition:transform_0.2s_cubic-bezier(.34,1.3,.64,1)),_opacity_0.15s_ease] hover:bg-[rgba(27,_58,_92,_0.2)] hover:outline-[2px] hover:outline-accent hover:outline-offset-[1px] focus-visible:bg-[rgba(27,_58,_92,_0.2)] focus-visible:outline-[2px] focus-visible:outline-accent focus-visible:outline-offset-[1px] hover:before:opacity-[1] hover:before:[transform:translateX(1px)_scale(1.15)] focus-visible:before:opacity-[1] focus-visible:before:[transform:translateX(1px)_scale(1.15)] print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0" href="#" data-t="5763">1:36:03</a></h2>
<p class="mb-[0.85rem] print:[orphans:3] print:[widows:3]" data-cell-id="s5-intro">Endometrioza niszczy zarówno liczbę, jak i jakość jajeczek. Środowisko w miednicy staje się toksyczne: jajowody mogą być zablokowane, zapalne komórki atakują plemniki i zarodki. Zwiększa się ryzyko ciąży pozamacicznej i poronień.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-02">[2]</a></sup></p>
<div class="card-grid grid grid-cols-[1fr_1fr] gap-[0.85rem] [margin:1rem_0_1.15rem] [&_.card]:m-[0] max-sm:grid-cols-[1fr]">
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s5-reserve"><b>Rezerwa jajnikowa</b>Można mieć 30 lat i rezerwę jajnikową 40-latki (lub zero jajeczek). Poznaj swoje AMH jak najwcześniej.</div>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s5-auto"><b>Choroby autoimmunologiczne</b>Endometrioza wiąże się ze zwiększonym ryzykiem niektórych chorób autoimmunologicznych (badania wskazują na 20–100% wyższe ryzyko względne, zależnie od konkretnej choroby autoimmunologicznej).<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-04">[4]</a></sup> Przy staraniach o dziecko lub po poronieniach warto poprosić o pełny panel autoimmunologiczny.</div>
</div>
<div class="bg-purple-bg border-l-2 border-l-purple/60 px-[0.95rem] py-[0.72rem] my-[0.9rem] text-[0.88rem] rounded-r-[10px] [&>em]:not-italic [&>em]:font-semibold [&>em]:text-purple" data-cell-id="s5-freeze">
<span class="font-bold text-purple/90 text-[0.72rem] uppercase tracking-[0.06em] block mb-[0.28rem]">Zalecenie z odcinka</span>
Rozważ zamrożenie jajeczek, szczególnie jeśli masz endometriozę lub obniżone AMH. Im młodsze jajeczko w momencie zamrożenia, tym wyższa jego jakość.
</div>
<h2 class="text-[1.18rem] font-bold text-accent [margin:3rem_0_0.9rem] pb-[0.35rem] border-b-[2px] border-b-accent-light [&_.n]:text-muted [&_.n]:font-medium [&_.n]:mr-[0.3rem] print:!text-[#000] print:border-b-[1px] print:border-b-[#999] print:[page-break-after:avoid] print:[break-after:avoid]" id="pcos"><span class="n">6.</span> PCOS — zespół policystycznych jajników <a class="ts text-[0.72em] text-accent no-underline [padding:0.1em_0.45em_0.1em_0.3em] rounded-[3px] bg-accent-light whitespace-nowrap cursor-pointer ml-[0.3em] [font-variant-numeric:tabular-nums] align-middle inline-flex items-center gap-[0.25em] [transition:background_0.15s_ease,_transform_0.15s_ease] before:content-[ print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0 decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:underline"▸"] before:text-[0.95em] before:opacity-[0.65] before:leading-[1] before:[transition:transform_0.2s_cubic-bezier(.34,1.3,.64,1)),_opacity_0.15s_ease] hover:bg-[rgba(27,_58,_92,_0.2)] hover:outline-[2px] hover:outline-accent hover:outline-offset-[1px] focus-visible:bg-[rgba(27,_58,_92,_0.2)] focus-visible:outline-[2px] focus-visible:outline-accent focus-visible:outline-offset-[1px] hover:before:opacity-[1] hover:before:[transform:translateX(1px)_scale(1.15)] focus-visible:before:opacity-[1] focus-visible:before:[transform:translateX(1px)_scale(1.15)] print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0" href="#" data-t="924">0:15:24</a></h2>
<p class="mb-[0.85rem] print:[orphans:3] print:[widows:3]" data-cell-id="s6-prev">PCOS dotyka 8–13% kobiet w wieku rozrodczym wg metaanalizy globalnej (kryteria rotterdamskie).<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-01">[1]</a>,<a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-13">[13]</a></sup> Dr Aliabadi podaje wyższy odsetek (15–20%), co może odzwierciedlać różnice populacyjne. Zdaniem Dr Aliabadi ponad 50% pacjentek z PCOS może mieć jednocześnie endometriozę. <em>To obserwacja kliniczna dr Aliabadi, a nie potwierdzony szacunek z literatury; dotychczasowe badania podają bardzo różne odsetki współwystępowania.</em></p>
<h3 class="text-[1.02rem] font-semibold [margin:1.7rem_0_0.45rem] text-[rgb(36,_52,_70)] print:!text-[#000] print:[page-break-after:avoid] print:[break-after:avoid]">Diagnoza — 2 z 3 kryteriów (Rotterdam)</h3>
<div class="card-grid grid grid-cols-[1fr_1fr] gap-[0.85rem] [margin:1rem_0_1.15rem] [&_.card]:m-[0] max-sm:grid-cols-[1fr]">
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s6-rott1"><b>1. Objawy wysokich androgenów</b>Trądzik, owłosienie twarzy i ciała (hirsutyzm), łysienie typu męskiego. Prawidłowe stężenie testosteronu we krwi nie wyklucza PCOS.</div>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s6-rott2"><b>2. Zaburzenia owulacji</b>Nieregularne miesiączki, cykle dłuższe niż 35 dni, mniej niż 8 miesiączek rocznie. Według dr Aliabadi brak owulacji może dotyczyć 70–80% pacjentek z PCOS, nawet przy pozornie regularnych krwawieniach.</div>
</div>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s6-rott3"><b>3. Obraz PCOS na USG lub podwyższone AMH</b>
Policystyczne jajniki w badaniu ultrasonograficznym lub podwyższony poziom hormonu antymüllerowskiego.</div>
<div class="px-4 py-[0.8rem] my-[0.95rem] text-[0.88rem] rounded-r-[10px] shadow-sm bg-[#f2f7fb] border-l-4 border-accent [&>em]:not-italic [&>em]:font-semibold [&>em]:text-accent" data-cell-id="s6-lean"><em>Ważne:</em> Można mieć PCOS bez nadwagi — 25% pacjentek z PCOS jest szczupłych.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-12">[12]</a></sup> PCOS to zaburzenie wieloukładowe: oś mózg-jajnik, insulinooporność, przewlekły stan zapalny, genetyka.</div>
<h2 class="text-[1.18rem] font-bold text-accent [margin:3rem_0_0.9rem] pb-[0.35rem] border-b-[2px] border-b-accent-light [&_.n]:text-muted [&_.n]:font-medium [&_.n]:mr-[0.3rem] print:!text-[#000] print:border-b-[1px] print:border-b-[#999] print:[page-break-after:avoid] print:[break-after:avoid]" id="leczenie-pcos"><span class="n">7.</span> Leczenie PCOS <a class="ts text-[0.72em] text-accent no-underline [padding:0.1em_0.45em_0.1em_0.3em] rounded-[3px] bg-accent-light whitespace-nowrap cursor-pointer ml-[0.3em] [font-variant-numeric:tabular-nums] align-middle inline-flex items-center gap-[0.25em] [transition:background_0.15s_ease,_transform_0.15s_ease] before:content-[ print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0 decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:underline"▸"] before:text-[0.95em] before:opacity-[0.65] before:leading-[1] before:[transition:transform_0.2s_cubic-bezier(.34,1.3,.64,1)),_opacity_0.15s_ease] hover:bg-[rgba(27,_58,_92,_0.2)] hover:outline-[2px] hover:outline-accent hover:outline-offset-[1px] focus-visible:bg-[rgba(27,_58,_92,_0.2)] focus-visible:outline-[2px] focus-visible:outline-accent focus-visible:outline-offset-[1px] hover:before:opacity-[1] hover:before:[transform:translateX(1px)_scale(1.15)] focus-visible:before:opacity-[1] focus-visible:before:[transform:translateX(1px)_scale(1.15)] print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0" href="#" data-t="3680">1:01:20</a></h2>
<h3 class="text-[1.02rem] font-semibold [margin:1.7rem_0_0.45rem] text-[rgb(36,_52,_70)] print:!text-[#000] print:[page-break-after:avoid] print:[break-after:avoid]">Pięć filarów</h3>
<ol class="rec list-none p-[0] [counter-reset:r_0] [margin:1.1rem_0_0] [&_li]:[counter-increment:r_1] [&_li]:[padding:0.75rem_1rem_0.75rem_3rem] [&_li]:mb-[0.55rem] [&_li]:bg-surface [&_li]:border-[1px] [&_li]:border-border [&_li]:rounded-[10px] [&_li]:relative [&_li]:text-[0.9rem] [&_li]:shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_li::before]:content-[counter(r)] [&_li::before]:absolute [&_li::before]:left-[0.8rem] [&_li::before]:top-[0.72rem] [&_li::before]:bg-accent [&_li::before]:text-[rgb(255,_255,_255)] [&_li::before]:w-[1.45rem] [&_li::before]:h-[1.45rem] [&_li::before]:rounded-[50%] [&_li::before]:text-center [&_li::before]:leading-[1.45rem] [&_li::before]:text-[0.76rem] [&_li::before]:font-bold">
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s7-life"><b>Styl życia</b> — sen (priorytet), redukcja stresu, regularne ćwiczenia, przerywanie siedzenia krótkim spacerem (poprawia glukozę i insulinę)<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-17">[17]</a></sup> — wg dr Aliabadi zwłaszcza po posiłkach; dieta niskozapalna.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-01">[1]</a></sup></li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s7-suppl"><b>Suplementy</b> — inozytol (myo + D-chiro), witamina D, koenzym Q10, kurkumina, chrom, liść morwy.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s7-met"><b>Metformina</b> — poprawia insulinowrażliwość (wytyczne zalecają 1000–2500 mg/dobę, stopniowo zwiększając dawkę).<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-01">[1]</a></sup> Protokół dr Aliabadi: start od 750 mg wieczorem, potem 750 mg 2× dziennie.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s7-glp1"><b>Leki GLP-1</b> (np. Ozempic, Trulicity) — w badaniach u kobiet z PCOS wykazano redukcję masy ciała, obwodu talii i trójglicerydów.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-08">[8]</a></sup> Wg dr Aliabadi leki te regulują również insulinę i zmniejszają stan zapalny; stosuje je od 2014 roku.</li>
<li class="mb-[0.28rem] print:[orphans:3] print:[widows:3]" data-cell-id="s7-letro"><b>Letrozol / Klomifen</b> — jeśli starasz się o ciążę i nie dochodzi do owulacji. Letrozol jest obecnie pierwszą linią indukcji owulacji w PCOS.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-01">[1]</a></sup></li>
</ol>

<tr data-cell-id="s7-coq10"><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]"><strong>Koenzym Q10</strong></td><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]">Antyoksydant, wsparcie mitochondrialne.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-09">[9]</a></sup></td></tr>
<tr data-cell-id="s7-kurk"><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]"><strong>Kurkumina</strong></td><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]">Działanie przeciwzapalne.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-14">[14]</a></sup></td></tr>
<tr data-cell-id="s7-chrom"><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]"><strong>Chrom</strong></td><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]">Może poprawiać insulinowrażliwość.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-15">[15]</a></sup></td></tr>
<tr data-cell-id="s7-mulb"><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]"><strong>Liść morwy</strong></td><td class="[padding:0.52rem_0.65rem] border-b-[1px] border-b-border align-top print:[orphans:3] print:[widows:3]">Może spowalniać wchłanianie cukrów.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-16">[16]</a></sup></td></tr>

<div class="flex-1 min-w-[200px] px-4 pt-4 pb-[0.9rem] rounded-[10px] text-center bg-gradient-to-b from-[#f9fbfd] to-accent-light border border-border shadow-sm" data-cell-id="s8-stat85"><div class="text-[1.95rem] font-bold text-accent leading-[1.05]">ok. 85%</div><div class="text-[0.8rem] text-muted mt-[0.3rem]">kobiet z rakiem piersi <strong>nie ma</strong> historii rodzinnej<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-10">[10]</a></sup></div></div>

<p class="mb-[0.85rem] print:[orphans:3] print:[widows:3]" data-cell-id="s8-tyrer">Dr Aliabadi zaleca obliczenie ryzyka życiowego raka piersi za pomocą <a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="https://ibis.ikonopedia.com">Tyrer-Cuzick Risk Assessment Tool</a> (darmowy, online). Jeśli ryzyko wynosi 20% lub więcej, powinnaś mieć obrazowanie piersi (MRI + mammografia) już od 30. roku życia, nie czekając do 40.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-10">[10]</a></sup></p>
<div class="px-4 py-[0.8rem] my-[0.95rem] text-[0.88rem] rounded-r-[10px] shadow-sm bg-[#f2f7fb] border-l-4 border-accent [&>em]:not-italic [&>em]:font-semibold [&>em]:text-accent" data-cell-id="s8-brca"><em>Testy genetyczne:</em> Jeśli masz rodzinną historię nowotworów (piersi, jajników, trzustki, prostaty w rodzinie), poproś o testy genetyczne. Warto znać swój status BRCA i innych genów.</div>
<h2 class="text-[1.18rem] font-bold text-accent [margin:3rem_0_0.9rem] pb-[0.35rem] border-b-[2px] border-b-accent-light [&_.n]:text-muted [&_.n]:font-medium [&_.n]:mr-[0.3rem] print:!text-[#000] print:border-b-[1px] print:border-b-[#999] print:[page-break-after:avoid] print:[break-after:avoid]" id="pmdd"><span class="n">9.</span> PMDD — przedmiesiączkowe zaburzenie dysforyczne <a class="ts text-[0.72em] text-accent no-underline [padding:0.1em_0.45em_0.1em_0.3em] rounded-[3px] bg-accent-light whitespace-nowrap cursor-pointer ml-[0.3em] [font-variant-numeric:tabular-nums] align-middle inline-flex items-center gap-[0.25em] [transition:background_0.15s_ease,_transform_0.15s_ease] before:content-[ print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0 decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:underline"▸"] before:text-[0.95em] before:opacity-[0.65] before:leading-[1] before:[transition:transform_0.2s_cubic-bezier(.34,1.3,.64,1)),_opacity_0.15s_ease] hover:bg-[rgba(27,_58,_92,_0.2)] hover:outline-[2px] hover:outline-accent hover:outline-offset-[1px] focus-visible:bg-[rgba(27,_58,_92,_0.2)] focus-visible:outline-[2px] focus-visible:outline-accent focus-visible:outline-offset-[1px] hover:before:opacity-[1] hover:before:[transform:translateX(1px)_scale(1.15)] focus-visible:before:opacity-[1] focus-visible:before:[transform:translateX(1px)_scale(1.15)] print:!bg-[none] print:!text-[#000] print:!p-[0] print:!border-0" href="#" data-t="10386">2:53:06</a></h2>
<p class="mb-[0.85rem] print:[orphans:3] print:[widows:3]" data-cell-id="s9-intro">PMDD to nie zaburzenie hormonalne w klasycznym sensie. Kobiety z PMDD mają normalne poziomy hormonów, ale ich mózg reaguje ekstremalnie na normalne wahania progesteronu i jego metabolitów (szczególnie allopregnanolonu)<sup><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-18">[18]</a></sup>.</p>
<div class="card-grid grid grid-cols-[1fr_1fr] gap-[0.85rem] [margin:1rem_0_1.15rem] [&_.card]:m-[0] max-sm:grid-cols-[1fr]">
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s9-ssri"><b>Leczenie: SSRI</b>
SSRI (Prozac, Zoloft) są skuteczne w leczeniu PMDD zarówno w dawkowaniu ciągłym, jak i pulsacyjnym (10–14 dni fazy lutealnej). Przegląd Cochrane wskazuje, że dawkowanie ciągłe jest prawdopodobnie skuteczniejsze.<sup class="ref text-[0.68em] align-super ml-[1px] [&_a]:text-accent [&_a]:no-underline [&_a]:border-b-0 [&_a:hover]:underline [&_a:focus-visible]:bg-accent-light"><a class="text-accent decoration-[1px] underline-offset-[2px] hover:no-underline focus-visible:outline-[3px] focus-visible:outline-accent focus-visible:outline-offset-[3px] focus-visible:rounded-[4px] print:!text-[#000] print:underline" href="#src-07">[7]</a></sup> Dr Aliabadi preferuje podejście pulsacyjne.</div>
<div class="card bg-surface border-[1px] border-border rounded-[10px] [padding:1.15rem_1.3rem] [margin:0.8rem_0] shadow-[0_1px_2px_rgba(0,0,0,0.04)] [&_b]:block [&_b]:mb-[0.35rem] print:[page-break-inside:avoid] print:[break-inside:avoid] print:!border-[1px] print:!border-[#999] print:!shadow-[none]" data-cell-id="s9-peri"><b>Po 40. roku życia</b>
Nagłe pojawienie się objawów afektywnych związanych z cyklem po 40. r.ż. może wskazywać na perimenopauzę, a nie na PMDD. Warto to rozróżnić.</div>
